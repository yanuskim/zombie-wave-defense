<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e0c"/>
      <stop offset="60%" stop-color="#1a2e1e"/>
      <stop offset="100%" stop-color="#0d1a10"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a20"/>
      <stop offset="100%" stop-color="#0a100b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 하늘 -->
  <rect width="800" height="450" fill="url(#sky)"/>

  <!-- 달 -->
  <circle cx="680" cy="70" r="38" fill="#c8d4b0" opacity="0.18"/>
  <circle cx="668" cy="62" r="38" fill="#0a0e0c"/>
  <circle cx="685" cy="68" r="36" fill="#d4e0bb" opacity="0.13"/>

  <!-- 별 -->
  <g fill="#c8d4b0" opacity="0.5">
    <circle cx="80" cy="40" r="1.5"/>
    <circle cx="150" cy="25" r="1"/>
    <circle cx="220" cy="55" r="1.5"/>
    <circle cx="320" cy="30" r="1"/>
    <circle cx="410" cy="20" r="1.5"/>
    <circle cx="500" cy="45" r="1"/>
    <circle cx="570" cy="15" r="1.5"/>
    <circle cx="720" cy="110" r="1"/>
    <circle cx="50" cy="90" r="1"/>
    <circle cx="740" cy="35" r="1.5"/>
  </g>

  <!-- 배경 건물 실루엣 -->
  <g fill="#0f1a12" opacity="0.8">
    <rect x="0"   y="200" width="60"  height="250"/>
    <rect x="20"  y="170" width="30"  height="30"/>
    <rect x="700" y="210" width="100" height="240"/>
    <rect x="720" y="180" width="25"  height="30"/>
    <rect x="740" y="160" width="10"  height="20"/>
    <rect x="620" y="230" width="90"  height="220"/>
    <rect x="630" y="200" width="20"  height="30"/>
  </g>

  <!-- 바닥 -->
  <rect x="0" y="340" width="800" height="110" fill="url(#ground)"/>

  <!-- 바리케이드 / 담장 -->
  <g fill="#2a3d2c" stroke="#3d5c40" stroke-width="1.5">
    <rect x="60"  y="310" width="18" height="50"/>
    <rect x="82"  y="305" width="18" height="55"/>
    <rect x="104" y="310" width="18" height="50"/>
    <rect x="126" y="302" width="18" height="58"/>
    <rect x="148" y="308" width="18" height="52"/>
    <rect x="580" y="308" width="18" height="52"/>
    <rect x="602" y="303" width="18" height="57"/>
    <rect x="624" y="310" width="18" height="50"/>
    <rect x="646" y="305" width="18" height="55"/>
    <rect x="668" y="310" width="18" height="50"/>
    <rect x="690" y="302" width="18" height="58"/>
    <rect x="712" y="308" width="18" height="52"/>
  </g>
  <!-- 담장 가로대 -->
  <rect x="55" y="316" width="115" height="6" fill="#3d5c40" rx="2"/>
  <rect x="575" y="316" width="165" height="6" fill="#3d5c40" rx="2"/>

  <!-- 메인 기지 건물 -->
  <!-- 기지 본관 -->
  <rect x="220" y="200" width="360" height="160" fill="#1a2e1e" stroke="#2a4a2e" stroke-width="2" rx="4"/>
  <!-- 지붕 -->
  <polygon points="200,200 400,140 600,200" fill="#152518" stroke="#1e3820" stroke-width="2"/>
  <!-- 굴뚝 -->
  <rect x="340" y="145" width="20" height="55" fill="#111c13" stroke="#1e3820" stroke-width="1"/>
  <rect x="450" y="155" width="16" height="45" fill="#111c13" stroke="#1e3820" stroke-width="1"/>
  <!-- 굴뚝 연기 -->
  <ellipse cx="350" cy="138" rx="12" ry="6" fill="#2a3a2c" opacity="0.5"/>
  <ellipse cx="347" cy="126" rx="9"  ry="5" fill="#2a3a2c" opacity="0.35"/>
  <ellipse cx="458" cy="148" rx="10" ry="5" fill="#2a3a2c" opacity="0.4"/>

  <!-- 창문들 -->
  <g fill="#c8a84b" opacity="0.7" filter="url(#glow)">
    <rect x="250" y="230" width="40" height="30" rx="2"/>
    <rect x="310" y="230" width="40" height="30" rx="2"/>
    <rect x="450" y="230" width="40" height="30" rx="2"/>
    <rect x="510" y="230" width="40" height="30" rx="2"/>
  </g>
  <!-- 창문 격자 -->
  <g stroke="#0a0e0c" stroke-width="1" opacity="0.6">
    <line x1="270" y1="230" x2="270" y2="260"/>
    <line x1="250" y1="245" x2="290" y2="245"/>
    <line x1="330" y1="230" x2="330" y2="260"/>
    <line x1="310" y1="245" x2="350" y2="245"/>
    <line x1="470" y1="230" x2="470" y2="260"/>
    <line x1="450" y1="245" x2="490" y2="245"/>
    <line x1="530" y1="230" x2="530" y2="260"/>
    <line x1="510" y1="245" x2="550" y2="245"/>
  </g>

  <!-- 기지 출입문 -->
  <rect x="370" y="290" width="60" height="70" fill="#0f1a12" stroke="#2a4a2e" stroke-width="2" rx="2"/>
  <rect x="378" y="298" width="20" height="62" fill="#1a2e1e"/>
  <rect x="402" y="298" width="20" height="62" fill="#1a2e1e"/>
  <!-- 문 손잡이 -->
  <circle cx="400" cy="332" r="4" fill="#c8a84b" opacity="0.8"/>

  <!-- ZWD 로고 / 기지 표지판 -->
  <rect x="345" y="195" width="110" height="28" fill="#0a0e0c" stroke="#c8a84b" stroke-width="1.5" rx="3"/>
  <text x="400" y="214" font-family="monospace" font-size="13" font-weight="bold" fill="#c8a84b" text-anchor="middle">ZWD BASE</text>

  <!-- 기지 외벽 균열 -->
  <g stroke="#0a1209" stroke-width="1" opacity="0.4">
    <polyline points="240,240 248,255 244,270"/>
    <polyline points="555,250 562,265 558,280"/>
  </g>

  <!-- 경계등 -->
  <circle cx="170" cy="305" r="6" fill="#c8a84b" opacity="0.9" filter="url(#glow)"/>
  <circle cx="630" cy="305" r="6" fill="#c8a84b" opacity="0.9" filter="url(#glow)"/>

  <!-- 안개 / 분위기 -->
  <rect x="0" y="320" width="800" height="40" fill="#1a2e1e" opacity="0.15"/>
  <rect x="0" y="340" width="800" height="20" fill="#0a0e0c" opacity="0.25"/>

  <!-- 하단 텍스트 -->
  <text x="400" y="400" font-family="monospace" font-size="11" fill="#4a6e4e" text-anchor="middle" opacity="0.7">SURVIVALS BASE · 2089.12.25</text>
</svg>